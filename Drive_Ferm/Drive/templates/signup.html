<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../static/css/css2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <title>Sign Up</title>
    <style>

    </style>
</head>
<body>

<div class="main">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="d-flex justify-content-center align-items-center order-first d-none d-sm-none d-md-block wop rounded">
            <div id="mydiv" class="rounded shadow"></div>
        </div>
        <div class="d-flex justify-content-center align-items-center order-last pow rounded">
            <form method="post" class="ps-5 pe-5">
                {% csrf_token %}
                <div class="form-group" class="ps-5 pe-5">
                    <h2>
                        <a class="navbar-brand" href=""><img src="../static/background/location.png" alt="">
                            <img src="./Logo.png" alt="" width="50%">
                        </a>
                    </h2>
                </div>
                <br><br>
                <div class="form-group ps-5 pe-5">
                    <label for="InputEmail1">Email address</label>
                    <input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp" placeholder="Enter email" name="email" required>
                    <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
                </div>
                <div class="form-group ps-5 pe-5">
                    <label for="InputPassword1">Password</label>
                    <input type="password" class="form-control" id="InputPassword1" placeholder="Password" name="password" required>
                </div>
                <br>
                <div class="form-group ps-5 pe-5">
                    <label for="userType">User Type</label>
                    <select class="form-control" id="userType" name="user_type">
                        <option value="" selected disabled>Choose a User Type</option>
                        <option value="customer">Customer</option>
                        <option value="business_owner">Business Owner</option>
                    </select>
                </div>
                <div id="businessFields" style="display: none;">
                    <div class="form-group ps-5 pe-5">
                        <label for="InputBusinessName">Business Name</label>
                        <input type="text" class="form-control" id="InputBusinessName" placeholder="Business Name" name="business_name">
                    </div>
                    <div class="form-group ps-5 pe-5">
                        <label for="InputPhoneNumber">Phone Number</label>
                        <input type="text" class="form-control" id="InputPhoneNumber" placeholder="Phone Number" name="phone_number">
                    </div>
                    <div class="form-group ps-5 pe-5">
                        <label for="InputLocation">Location</label>
                        <input type="text" class="form-control" id="InputLocation" placeholder="Location" name="location">
                    </div>
                </div>
                <div id="customerFields" style="display: none;">
                    <div class="form-group ps-5 pe-5">
                        <label for="InputFirstName">First Name</label>
                        <input type="text" class="form-control" id="InputFirstName" placeholder="First Name" name="first_name" required>
                    </div>
                    <div class="form-group ps-5 pe-5">
                        <label for="InputLastName">Last Name</label>
                        <input type="text" class="form-control" id="InputLastName" placeholder="Last Name" name="last_name" required>
                    </div>
                    <div class="form-group ps-5 pe-5">
                        <label for="InputShippingAddress">Shipping Address</label>
                        <input type="text" class="form-control" id="InputShippingAddress" placeholder="Shipping Address" name="shipping_address">
                    </div>
                </div>
                <br>
                <div class="form-group">
                  <a href="{% url 'login' %}" class="text-success">Already have an account?</a>
                </div>
                <br>
                <button type="submit" class="btn btn-outline-success">Submit</button>
            </form>
        </div>
    </div>
</div>
         
<script>
    document.getElementById('userType').addEventListener('change', function() {
        var userType = this.value;
        var businessFields = document.getElementById('businessFields');
        var customerFields = document.getElementById('customerFields');

        if (userType === 'business_owner') {
            businessFields.style.display = 'block';
            customerFields.style.display = 'none';
        } else if (userType === 'customer') {
            businessFields.style.display = 'none';
            customerFields.style.display = 'block';
        } else {
            businessFields.style.display = 'none';
            customerFields.style.display = 'none';
        }
    });
</script>

</body>
</html>
